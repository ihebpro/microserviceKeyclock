spring.application.name=gateway-service

spring.config.import=optional:configserver:http://localhost:8888

spring.cloud.consul.host=localhost
spring.cloud.consul.port=8500
spring.cloud.consul.discovery.service-name=gateway-service
spring.cloud.consul.discovery.health-check-path=/actuator/health
spring.cloud.consul.discovery.health-check-interval=10s

spring.cloud.gateway.discovery.locator.enabled=false

# \u2500\u2500 Route Identity Service \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
spring.cloud.gateway.routes[0].id=identity-service
spring.cloud.gateway.routes[0].uri=lb://identity-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**, /api/v1/users/**
spring.cloud.gateway.routes[0].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[0].filters[0].args.name=identityCircuitBreaker
spring.cloud.gateway.routes[0].filters[0].args.fallbackUri=forward:/fallback/identity

# \u2500\u2500 Route Customer Service \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
spring.cloud.gateway.routes[1].id=customer-service
spring.cloud.gateway.routes[1].uri=lb://customer-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/companies/**, /api/v1/contracts/**, /api/v1/slas/**
spring.cloud.gateway.routes[1].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[1].filters[0].args.name=customerCircuitBreaker
spring.cloud.gateway.routes[1].filters[0].args.fallbackUri=forward:/fallback/customer


# S\u00e9curit\u00e9 : validation du JWT \u00e9mis par Keycloak
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/Nexus3PL

server.port=8080

resilience4j.circuitbreaker.instances.identityCircuitBreaker.slidingWindowSize=10
resilience4j.circuitbreaker.instances.identityCircuitBreaker.failureRateThreshold=50
resilience4j.circuitbreaker.instances.identityCircuitBreaker.waitDurationInOpenState=5s

resilience4j.circuitbreaker.instances.customerCircuitBreaker.slidingWindowSize=10
resilience4j.circuitbreaker.instances.customerCircuitBreaker.failureRateThreshold=50
resilience4j.circuitbreaker.instances.customerCircuitBreaker.waitDurationInOpenState=5s

management.endpoints.web.exposure.include=health,info,gateway

# \u2500\u2500 OpenAPI Swagger UI Aggregation \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
spring.cloud.gateway.routes[2].id=openapi-identity
spring.cloud.gateway.routes[2].uri=lb://identity-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/v3/api-docs/identity-service
spring.cloud.gateway.routes[2].filters[0].name=RewritePath
spring.cloud.gateway.routes[2].filters[0].args.regexp=/v3/api-docs/identity-service
spring.cloud.gateway.routes[2].filters[0].args.replacement=/v3/api-docs

spring.cloud.gateway.routes[3].id=openapi-customer
spring.cloud.gateway.routes[3].uri=lb://customer-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/v3/api-docs/customer-service
spring.cloud.gateway.routes[3].filters[0].name=RewritePath
spring.cloud.gateway.routes[3].filters[0].args.regexp=/v3/api-docs/customer-service
spring.cloud.gateway.routes[3].filters[0].args.replacement=/v3/api-docs

springdoc.swagger-ui.urls[0].name=Identity Service
springdoc.swagger-ui.urls[0].url=/v3/api-docs/identity-service
springdoc.swagger-ui.urls[1].name=Customer Service
springdoc.swagger-ui.urls[1].url=/v3/api-docs/customer-service
spring.cloud.consul.discovery.prefer-ip-address=true